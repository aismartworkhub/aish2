name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt ${attempt}/3), retrying after backoff..."
            sleep $((attempt * 15))
          done
          exit 1

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
