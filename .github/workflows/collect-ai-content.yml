name: AI Content Collection (Daily)

on:
  schedule:
    # 매일 자정 KST (UTC 15:00)
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      max_items:
        description: "최대 수집 건수"
        required: false
        default: "10"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Run AI content collection
        run: npx tsx scripts/collect-ai-content.ts
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}
          MAX_ITEMS: ${{ github.event.inputs.max_items || '10' }}
          MIN_QUALITY_SCORE: "7"
